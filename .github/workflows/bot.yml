name: Affiliate Blog Bot

on:
  # ── Scheduled run every 8 hours ──────────────────────────────
  schedule:
    - cron: "0 */8 * * *"   # 00:00, 08:00, 16:00 UTC

  # ── Manual trigger from the Actions tab ──────────────────────
  workflow_dispatch:
    inputs:
      max_products:
        description: "Max products to process this run (1–5)"
        required: false
        default: "3"
        type: string

jobs:
  run-bot:
    name: Run Blog Bot
    runs-on: ubuntu-latest
    timeout-minutes: 30       # kill hung runs after 30 min

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the bot ────────────────────────────────────────
      - name: Run Affiliate Blog Bot
        env:
          # Google Sheets
          GOOGLE_CREDS_BASE64: ${{ secrets.GOOGLE_CREDS_BASE64 }}
          SPREADSHEET_ID:      ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME:          "Sheet1"
          LINK_COLUMN:         "1"

          # OpenRouter
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:    "anthropic/claude-3-haiku"

          # WordPress
          WP_SITE_URL:         ${{ secrets.WP_SITE_URL }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          WP_CATEGORY_ID:      "1"

          # Email
          EMAIL_USER:          ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}

          # Behavior
          MAX_PRODUCTS: ${{ github.event.inputs.max_products || '3' }}

        run: python bot.py

      # ── 5. Upload log as artifact (even on failure) ───────────
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_number }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 7
