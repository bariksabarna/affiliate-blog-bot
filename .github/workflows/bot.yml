name: Affiliate Blog Bot

on:
  schedule:
    - cron: "0 */8 * * *"   # every 8 hours
  workflow_dispatch:

jobs:
  run-bot:
    name: Run Blog Bot
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Affiliate Blog Bot
        env:
          GOOGLE_CREDS_BASE64: ${{ secrets.GOOGLE_CREDS_BASE64 }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

          # Leave blank to auto-detect input sheet.
          # If you know the exact input sheet, set it here.
          INPUT_SHEET_NAME: ""

          # Your existing posts sheet
          OUTPUT_SHEET_NAME: "Posts"

          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: "anthropic/claude-3-haiku"
          SITE_URL: "https://affiliate-blog-bot"
          MAX_PRODUCTS: "1"
        run: python bot.py
